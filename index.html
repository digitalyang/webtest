<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages 测试页</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #273043;
      background: linear-gradient(135deg, #fff7d6 0%, #e4f8ff 100%);
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .hero {
      padding: 40px 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(92, 113, 145, 0.16);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
    }

    .subtitle {
      margin: 0;
      font-size: 1.15rem;
      color: #5d6b82;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      color: #0f766e;
      background: #ccfbf1;
      font-weight: 700;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
      margin-top: 34px;
    }

    .card {
      overflow: hidden;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 16px 35px rgba(39, 48, 67, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 45px rgba(39, 48, 67, 0.18);
    }

    .card img {
      display: block;
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card p {
      margin: 0;
      padding: 16px 18px 20px;
      font-size: 1rem;
      color: #46556d;
    }

    footer {
      margin-top: 32px;
      text-align: center;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="badge">GitHub Pages is running</div>
      <h1>小猫小狗测试网页</h1>
      <p class="subtitle">如果你能看到这个页面和下面的图片，说明 GitHub Pages 已经正常工作。</p>
    </section>

    <section class="gallery" aria-label="小猫小狗图片">
      <article class="card">
        <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=900&q=80" alt="一只可爱的小猫">
        <p>小猫上线，负责检查页面是否加载成功。</p>
      </article>

      <article class="card">
        <img src="https://images.unsplash.com/photo-1552053831-71594a27632d?auto=format&fit=crop&w=900&q=80" alt="一只开心的小狗">
        <p>小狗上线，负责确认图片资源是否正常显示。</p>
      </article>

      <article class="card">
        <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?auto=format&fit=crop&w=900&q=80" alt="趴着休息的小猫">
        <p>再来一只猫，让测试页面看起来更热闹。</p>
      </article>

      <article class="card">
        <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?auto=format&fit=crop&w=900&q=80" alt="一只站在户外的小狗">
        <p>再来一只狗，祝你的 GitHub Pages 部署顺利。</p>
      </article>
    </section>

    <footer>
      <p>Created for GitHub Pages test.</p>
    </footer>
  </main>
</body>
</html>
