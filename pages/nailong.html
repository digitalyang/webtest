    <nav class="navbar" aria-label="页面导航">
      <a class="logo" href="../index.html">个人主页</a>
      <div class="nav-links">
        <a href="../index.html">首页</a>

    <section class="meme-panel">
      <div class="meme-copy">
        <span class="badge">Nailong Meme Fetcher</span>
        <h1>随机获取一张奶龙表情包</h1>
        <p>点击按钮后，页面会从独立脚本里的图片池随机加载一张奶龙表情包。后续可以直接在 <strong>assets/js/nailong.js</strong> 里补充 WebP 或 GIF 直链。</p>
        <button class="button" type="button" id="loadMemeButton">从网络获取一张</button>
      </div>
      <div class="meme-stage">
        <div class="meme-placeholder" id="memePlaceholder">点击左侧按钮开始获取</div>
        <img id="memeImage" alt="随机奶龙表情包" referrerpolicy="no-referrer">
        <p id="memeStatus">等待获取奶龙表情包。</p>
      </div>
    </section>

    <footer>
      <p><a href="../index.html">返回首页</a></p>
    </footer>
